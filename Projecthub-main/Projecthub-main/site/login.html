<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Project's Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="login.css" />
</head>

<body>

    <!-- Top bar -->
    <header class="login-topbar">
        <span class="nav-brand">Project's Hub</span>
        <a class="back-link" href="index.html">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to landing
        </a>
    </header>

    <!-- Centered login card -->
    <main class="login-main">
        <div class="login-card">

            <div>
                <h1 class="card-title">Sign in to Project's Hub</h1>
                <p class="card-subtitle">Access your dashboard and manage investments.</p>
            </div>

            <!-- form action goes to admin.html for this static demo -->
            <form class="login-form" action="admin.html" method="get">

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-input" id="email" type="email" placeholder="name@company.com" required />
                </div>

                <div class="form-group">
                    <div class="form-row">
                        <label class="form-label" for="password">Password</label>
                        <a class="form-link" href="#">Forgot?</a>
                    </div>
                    <input class="form-input" id="password" type="password" placeholder="••••••••" required />
                </div>

                <button class="btn-submit" type="submit">Sign in</button>

            </form>

            <div class="card-footer-note">
                <p>Don't have an account? <a href="#">Join as a Student</a></p>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="login-footer">
        <p>© 2026 Project's Hub. All rights reserved.</p>
    </footer>

    <script src="login.js" defer></script>
</body>
</html>
